services:
  db:
    image: mysql:8.0
    container_name: mercadolibre_db
    restart: unless-stopped
    environment:
      # V-05: Secretos leidos desde el archivo .env raiz (nunca hardcodeados aqui)
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercadolibre_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # V-05: Secretos leidos desde el archivo .env raiz
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 3306
      SERVER_PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET}
      FILES_IN_BD: ${FILES_IN_BD:-false}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
      USER_SEED_PASSWORD: ${USER_SEED_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mercadolibre_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      URLWebAPI: http://backend:3000
    ports:
      - "8080:8080"

volumes:
  mysql_data:
