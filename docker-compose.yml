services:
  db:
    image: mysql:8.0
    container_name: mercadolibre_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mercadolibrenode
      MYSQL_USER: mercadolibre_user
      MYSQL_PASSWORD: M3rc@d0
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercadolibre_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_DATABASE: mercadolibrenode
      DB_USER: mercadolibre_user
      DB_PASSWORD: M3rc@d0
      DB_PORT: 3306
      SERVER_PORT: 3000
      NODE_ENV: development
      JWT_SECRET: 865ad24cf96fa78ab5c3cdb48f5fb114923d95c8a4e4f1bc9c33f6eeda32ed9d4b8c57
      FILES_IN_BD: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mercadolibre_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      URLWebAPI: http://backend:3000
    ports:
      - "8080:8080"

volumes:
  mysql_data:
